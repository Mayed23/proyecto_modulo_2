<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <!--Enlace a fremwork Boostrap-->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>
    <header>

        <h1 class="text-center">Alke Wallet</h1>

    </header>

    <main>

    <section class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <h2 class="text-center mb-5">Login</h2>
            <form id="form-login">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type= "text" name="username" id="username" class="form-control" placeholder="Ingrese su Usuario">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña:</label>
                    <input type="password" name="password" id="password"
                        class="form-control" placeholder="Ingrese su contraseña" required>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn btn-mint">Iniciar sesión</button>                        
                </div>    
            </form>
            <div id="mensaje" class="mt-3"></div>
            <p class="text-center pt-3">¿Eres nuevo en Alke Wallet? <a class= "link" href="register.html">Registrate aquí</a></p>
        </div>
    </div>  
</section>  
    </main>

    <footer>

        <p class="text-center">&copy; 2026 Alke Wallet </p>
        <p class="text-center">Todos los derechos reservados.</p> 

    </footer>
    <script>
        document.getElementById("form-login").addEventListener("submit", function (event) {
            
            event.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            const mensaje = document.getElementById("mensaje")

        
            // Recuperar los usuarios registrados
            const usuarios = JSON.parse(localStorage.getItem("user")) || [];

            // Buscar un usuario que coincida con las credenciales usadas
            const usuarioEncontrado = usuarios.find(function (u) {
                return u.username === username && u.password === password;
            });

            if (!usuarioEncontrado) {
                mensaje.innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    Usuario o contraseñas incorrectos.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;

                document.getElementById("password").value;
                document.getElementById("password").focus();
            }
            
             // Guardamos quién inició sesión, útil para saludarlo en el menú
            localStorage.setItem("usuarioActivo", JSON.stringify(usuarioEncontrado));

            mensaje.innerHTML = `
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    ¡Bienvenido, ${usuarioEncontrado.nombre}! Redirigiendo...
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;

            setTimeout(function () {
                window.location.href = "menu.html";
            }, 2000);

        })
    </script>

    //Boostrap--
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
