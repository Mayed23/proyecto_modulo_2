<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

     <!-- Enlace a fremwork Boostrap-->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

 <link rel="stylesheet" href="assets/js/sccrit.js"> 
 <link rel="stylesheet" href="assets/css/style.css">

</head>
<body>
    <header>

        <h1 class="text-center">Alke Wallet</h1>
        <p class="text-center">Crea tu cuenta Alke Wallet</p>

    </header>
   <!--Creando formulario de ingreso-->
    <main>
        <section class="container">
            <div class="row justify-content-center" >
                <div class="col-12 col-md-10 col-lg-8">
                   <h2 class="text-center" mb-5> Registro de Usuarios</h2>
                   
                    <form id="form-register">
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre y Apellido </label>
                            <input type="text" name="nombre" id="nombre" class="form-control" placeholder="Ingrese su nombre y apellido" required >
                        </div>    
                        <div class="mt-3">
                            <label for="username" class="form-label">Usuario</label>
                            <input type= "text" name="username" id="username" class="form-control" placeholder="Ingrese su Usuario" required>
                        </div>
                        <div class="mt-3">
                            <label for="telefono" class="form-label">Nro. de Teléfono:</label>
                            <input type= "number" name="telefono" id="telefono" class="form-control" placeholder="Ingrese su número de telefono" required>
                        </div>
                        <div class="mt-3">
                        <label for="password" class="form-label">Contraseña:</label>
                        <input type="password" name="password" id="password"
                            class="form-control" placeholder="Ingrese su contraseña"
                            minlength="6" pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*]).{6,}$"
                            title="Debe tener al menos 6 caracteres, incluyendo letras, números y al menos un carácter especial (!@#$%^&*)" required>
                        <div class="form-text">Mínimo 6 caracteres: letras, números y al menos un carácter especial.</div>
                        </div>
                        <div class="mt-3">
                        <label for="confirm_password" class="form-label">Confirmar contraseña:</label>
                        <input type="password" name="confirm_password" class="form-control"                            
                            id="confirm_password" placeholder="Reingrese su contraseña" required>    
                        </div>
                        <div class="mt-5">
                            <button type="submit" class="btn btn btn-mint">Registrar</button>                        
                        </div>    
                    </form>
                    <p class="text-center mt-3">¿Ya tienes una cuenta? <a class="link" href="login.html">Inicia sesión</a></p>
                    <div id="mensaje" class="mt-3"></div>
                </div>
            </div>  
        </section>  

    </main>

    <footer>

       <p class="text-center">&copy; 2026 Alke Wallet </p>
       <p class="text-center">Todos los derechos reservados.</p> 

    </footer>
<script>
    document.getElementById("form-register").addEventListener("submit", function (event) {
    event.preventDefault();

    // Capturar los valores del formulario
    const nombre = document.getElementById("nombre").value;
    const username = document.getElementById("username").value;
    const telefono = document.getElementById("telefono").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;

    const mensaje = document.getElementById("mensaje");

    // Validar que las contraseñas coincidan
    if (password !== confirmPassword) {
       mensaje.innerHTML=
        `<div class="alert alert-danger alert-dismissile fale show" role="alert"> 
        Las contraseñas no coinciden, por favor intente nuevamente<button  type="button" class="btn-close" data-bs-dismiss="alert">
        </button></div>`
         // Limpiar los campos de contraseña para que reintente
        document.getElementById("password").value = "";
        document.getElementById("confirm_password").value = "";

        // Poner el foco en el primer campo de contraseña
        document.getElementById("password").focus();
        
    return;
    }

   
   

    //Recupera usuarios guardados, o crea un arreglo si no hay usuarios

    let user = JSON.parse(localStorage.getItem("user")) || [];
    
    // Crea y guarda el usuario en localStorage
    
     const newuser = { nombre, username, telefono, password };

    user.push(newuser);

    //Guarda el arreglo actualizado

    localStorage.setItem("user", JSON.stringify(user));

    document.getElementById ("mensaje").innerHTML=

    `<div class="alert alert-success alert-dismissible fade show"> ¡Registro exitoso! Redirigiendo al login... 
    <button type="button"class="btn-close" data-bs-dismiss="alert"></button>
    </div>`;

    setTimeout(function () {
        window.location.href = "login.html";
    }, 2000);
});   

</script>    
     //bootstrap
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
