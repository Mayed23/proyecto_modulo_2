<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>

     <!-- Enlace a fremwork Boostrap-->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--Fontawesome-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<link rel="stylesheet" href="assets/css/style.css">

</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <a href="menu.html" class="btn btn-outline-light"><i class="fa-solid fa-reply"></i></a>
        <h1 class="text-center">Alke Wallet</h1>
        <button id="logout" class="btn btn-outline-danger "><i class="fa-solid fa-power-off"></i></button>
    </header>

    <main id="menu">
        <section class="container mb-5">
            <div class="row justify-content-center">
                <div class= "glass-card col-10 col-md-3">
                    <div class="card-body text-center">
                        <h2>Saldo disponible</h2>
                        <span class="saldo">$4.000</span>
                        <p>Tu saldo total actual</p>
                    </div>
                </div>
            </div>
        </section>
        <section class="container-menu">
            <div class="row row-gap-3 justify-content-center">
                <div class="col-10 col-md-3">
                    <div class="glass-card">
                        <div class="card-body text-center">
                        <h3>Depositos</h3>
                        <p>Realiza depósitos en tu billetera</p>
                        <a href="deposit.html" class="btn btn-mint">Depósitos</a>
                    </div>
                </div>
                </div>
                <div class="col-10 col-md-3">
                    <div class="glass-card">
                        <div class="card-body text-center">
                            <h3>Enviar dinero</h3>
                            <p>Realizar envío de dinero</p>
                            <a href="sendmoney.html" class="btn btn-mint">Enviar</a>
                        </div>
                    </div>
                </div>
                <div class="col-10 col-md-3">
                    <div class="glass-card">
                        <div class="card-body text-center">
                        <h3>Transacciones</h3>
                        <p>Consultar movimientos de tu billera</p>
                        <a href="transactions.html" class="btn btn-mint">Transacciones</a>
                        </div>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <footer>

        <p class="text-center">&copy; 2026 Alke Wallet </p>
        <p class="text-center">Todos los derechos reservados.</p> 

    </footer>

    <script>

        // Evitar que el botón "atrás" muestre una versión cacheada del menú
        window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
        window.location.reload();
        }
        })

        //proteger vista menu
        const usuarioActivo = localStorage.getItem("usuarioActivo");

        if(!usuarioActivo){
            window.location.href="login.html"
        }

        //Cerrar sesion
        document.getElementById("logout").addEventListener("click",function(){
        localStorage.removeItem("usuarioActivo");
        window.location.href="login.html"
        })

        const saldo = Number(localStorage.getItem("saldo")) || 0
        document.querySelector(".saldo").textContent = "$" + saldo.toLocaleString ("es-CL");


    </script>
 
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
