<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sendmoney</title>

     <!-- Enlace a fremwork Boostrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- jQuery UI (para el autocompletado) -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

    <!--Fontawesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <a href="menu.html" class="btn btn-outline-light"><i class="fa-solid fa-reply"></i></a>
            <h1 class="text-center">Alke Wallet</h1>
        <button id="logout" class="btn btn-outline-danger "><i class="fa-solid fa-power-off"></i></button>
    </header>

    <main>
        <section class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-10 col-md-6 col-lg-4">
                    <div id="mensaje" class="mt-3"></div>
                    <h2 class="text-center mb-4">Envío de Dinero</h2>
                    <form id="form-envio">
                        <div class="glass-card mb-3">
                            <label for="destinatario" class="form-label">Destinatario</label>
                            <input type="text" id="destinatario" class="form-control" placeholder="Busca o escribe nombre" autocomplete="off" required>
                        </div>

                        <div id="datos-nuevo" class="mb-3" style="display:none;">
                            <label for="usuario-nuevo" class="form-label">Usuario de <span id="nombre-nuevo-label"></span></label>
                            <input type="text" id="usuario-nuevo" class="form-control" placeholder="Ingrese el usuario">
                        </div>    
                            <div class="glass-card mb-3">
                                <label for="monto" class="form-label">Monto a Enviar</label>
                                <input type="number" id="monto" class="form-control" placeholder="Ingrese el monto" min="1" required>
                            </div>

                            <div Class="mb-3">
                                <label class="form-label">Montos rápidos</label>
                                    <div class="d-flex flex-wrap gap-2" id="montos-rapidos">
                                        <button type="button" class="btn btn-mint btn-sm monto-rapido" data-monto="5000">$5.000</button>
                                        <button type="button" class="btn btn-mint btn-sm monto-rapido" data-monto="10000">$10.000</button>
                                        <button type="button" class="btn btn-mint btn-sm monto-rapido" data-monto="20000">$20.000</button>
                                        <button type="button" class="btn btn-mint btn-sm monto-rapido" data-monto="50000">$50.000</button>
                                    </div>
                            </div>        
                        
                        <div id="confirmacion" class="alert alert-secondary" style="display:none;"></div>
                        
                        <div class  ="text-center mt-4">
                            <button type="button" id="btn-confirmar" class="btn btn-success">Confirmar Monto</button>
                            <button type="submit" id="btn-depositar" class="btn btn-mint" style="display:none;">Enviar</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

    </main>

    <footer>

        <p class="text-center">&copy; 2026 Alke Wallet </p>
        <p class="text-center">Todos los derechos reservados.</p> 

    </footer>

     // jQuery y jQuery UI (para el autocompletado del destinatario)
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    
        <script src="assets/js/sccrit.js"></script>
    
    <script>
    
        const inputDestinatario = document.getElementById("destinatario");
        const inputUsuarioNuevo = document.getElementById("usuario-nuevo");
        const datosNuevo = document.getElementById("datos-nuevo");
        const nombreNuevoLabel = document.getElementById("nombre-nuevo-label");
        const inputMonto = document.getElementById("monto");
        const btnConfirmar = document.getElementById("btn-confirmar");
        const btnEnviar = document.getElementById("btn-depositar");
        const confirmacion = document.getElementById("confirmacion");
        const mensaje = document.getElementById("mensaje");

        function obtenerFrecuentes() {
            return JSON.parse(localStorage.getItem("frecuentes")) || [];
        }

        // Autocompletado con jQuery UI: sugiere nombres ya guardados
        $("#destinatario").autocomplete({
            source: obtenerFrecuentes().map(function (c) { return c.nombre; }),
            select: function (event, ui) {
                datosNuevo.style.display = "none";
                ocultarConfirmacion();
            }
        });

        // Crea usuario de no existir
        inputDestinatario.addEventListener("blur", function () {
            const nombre = inputDestinatario.value.trim();
            if (!nombre) return;

            const frecuentes = obtenerFrecuentes();
            const existe = frecuentes.some(function (c) {
                return c.nombre.toLowerCase() === nombre.toLowerCase();
            });

            if (existe) {
                datosNuevo.style.display = "none";
            } else {
                nombreNuevoLabel.textContent = nombre;
                datosNuevo.style.display = "block";
            }
            ocultarConfirmacion();
        });

        // Botones de montos rápidos
        document.querySelectorAll(".monto-rapido").forEach(function (boton) {
            boton.addEventListener("click", function () {
                inputMonto.value = this.dataset.monto;
                ocultarConfirmacion();
            });
        });

        inputMonto.addEventListener("input", ocultarConfirmacion);

        function ocultarConfirmacion() {
            confirmacion.style.display = "none";
            btnEnviar.style.display = "none";
            btnConfirmar.style.display = "inline-block";
        }

        // Confirma Destinatario y Monto
        btnConfirmar.addEventListener("click", function () {
            const nombre = inputDestinatario.value.trim();
            const monto = Number(inputMonto.value);

            if (!nombre) {
                mensaje.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        Ingresa el nombre del destinatario.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>`;
                return;
            }

            if (!monto || monto < 1) {
                mensaje.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        Ingresa un monto válido (mínimo $1).
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>`;
                return;
            }

            const saldoActual = Number(localStorage.getItem("saldo")) || 0;
            if (monto > saldoActual) {
                mensaje.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        No tienes saldo suficiente para este envío.
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>`;
                return;
            }

            confirmacion.textContent = `Vas a enviar $${monto.toLocaleString("es-CL")} a ${nombre}.`;
            confirmacion.style.display = "block";
            btnConfirmar.style.display = "none";
            btnEnviar.style.display = "inline-block";
        });

        // Procesar el envio
        document.getElementById("form-envio").addEventListener("submit", function (event) {
            event.preventDefault();

            const nombre = inputDestinatario.value.trim();
            const monto = Number(inputMonto.value);

            const frecuentes = obtenerFrecuentes();
            let contacto = frecuentes.find(function (c) {
                return c.nombre.toLowerCase() === nombre.toLowerCase();
            });

            // Si el contacto no existía, se agrega con nombre y usuario
            if (!contacto) {
                const usuarioNuevo = inputUsuarioNuevo.value.trim();
                contacto = { nombre: nombre, usuario: usuarioNuevo };
                frecuentes.push(contacto);
                localStorage.setItem("frecuentes", JSON.stringify(frecuentes));
            }

            // Disminuir saldo
            const saldoActual = Number(localStorage.getItem("saldo")) || 0;
            localStorage.setItem("saldo", saldoActual - monto);

            // Registrar el movimiento en el historial de transacciones
            const transacciones = JSON.parse(localStorage.getItem("transacciones")) || [];
            transacciones.push({
                fecha: new Date().toISOString(),
                tipo: "Envío",
                nombre: contacto.nombre,
                usuario: contacto.usuario || "",
                monto: monto
            });
            localStorage.setItem("transacciones", JSON.stringify(transacciones));

            mensaje.innerHTML = `
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    ¡Envío de $${monto.toLocaleString("es-CL")} a ${nombre} realizado con éxito!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;

            setTimeout(function () {
                window.location.href = "menu.html";
            }, 2000);
        });

    </script>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
